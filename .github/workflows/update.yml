name: 🤖 Auto-update AI tools

on:
  schedule:
    - cron: '0 6 * * *'  # 1PM Vietnam (UTC+7)
  workflow_dispatch:
    inputs:
      force_commit:
        description: 'Force commit even if no changes'
        required: false
        default: 'false'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run auto-update bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/fetch-data.js

      - name: Commit changes
        run: |
          git config user.name "AI Universe Bot"
          git config user.email "bot@ai-universe"
          git add data/ai-tools.json
          if git diff --staged --quiet && [ "${{ github.event.inputs.force_commit }}" != "true" ]; then
            echo "No changes to commit."
          else
            TOOL_COUNT=$(node -e "const d=require('./data/ai-tools.json'); console.log(d.tools.length)")
            git commit -m "🤖 Auto-update · ${TOOL_COUNT} tools · $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
