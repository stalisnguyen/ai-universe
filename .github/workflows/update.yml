name: 🤖 Daily AI Data Update

on:
  # Run every day at 06:00 UTC (1PM Vietnam time)
  schedule:
    - cron: '0 6 * * *'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      force_commit:
        description: 'Force commit even if no changes'
        required: false
        default: 'false'

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the updated JSON

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔍 Run data updater
        run: node scripts/fetch-data.js

      - name: 📋 Show diff
        run: |
          git diff data/ai-tools.json || echo "No diff"

      - name: 💾 Commit & push if changed
        run: |
          git config user.name  "AI Universe Bot"
          git config user.email "bot@ai-universe.dev"
          git add data/ai-tools.json

          # Check if there's anything staged
          if git diff --staged --quiet && [ "${{ github.event.inputs.force_commit }}" != "true" ]; then
            echo "✅ No changes to commit — data is up to date"
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "🤖 Auto-update AI data · $TIMESTAMP"
            git push
            echo "🚀 Data pushed — Cloudflare Pages will redeploy automatically"
          fi

      - name: 📊 Print summary
        run: |
          echo "=== Update Summary ==="
          echo "Run time: $(date -u)"
          echo "Tools in data:"
          node -e "
            const d = require('./data/ai-tools.json');
            console.log('  Total tools:', d.tools.length);
            console.log('  Last updated:', d.lastUpdated);
            console.log('  Last checked:', d.lastChecked);
            if (d.checkLog && d.checkLog.length > 0) {
              console.log('  Changes found:', d.checkLog.length);
            }
          "
